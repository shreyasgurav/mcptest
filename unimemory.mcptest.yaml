name: UniMemory MCP Server Test Suite

server:
  transport: http
  url: https://unimemory.up.railway.app/api/v1/mcp

timeout: 15000

tests:
  - name: Search with valid query
    tool: search
    input:
      query: "history of quantum physics"
    expect:
      schema: true

  - name: Search with empty query
    tool: search
    input:
      query: ""
    expect:
      isError: true

  - name: Search with project ID
    tool: search
    input:
      query: "JavaScript tutorials"
      project_id: "12345"
    expect:
      schema: true

  - name: Search with limit
    tool: search
    input:
      query: "AI advancements"
      limit: 5
    expect:
      json:
        $type: "array"
        $minLength: 0

  - name: Context with valid document ID
    tool: context
    input:
      document_id: "abcde12345"
    expect:
      schema: true

  - name: Context with empty document ID
    tool: context
    input:
      document_id: ""
    expect:
      isError: true

  - name: Fetch with valid document ID
    tool: fetch
    input:
      id: "abcde12345"
    expect:
      schema: true

  - name: Save new content with valid input
    tool: save
    input:
      content: "This is a test note about machine learning."
    expect:
      schema: true

  - name: Save new content with empty content
    tool: save
    input:
      content: ""
    expect:
      isError: true

  - name: Save new content under a project
    tool: save
    input:
      content: "This is a project-specific document."
      project_id: "67890"
    expect:
      schema: true

  - name: List projects
    tool: listProjects
    input: {}
    expect:
      json:
        $type: "array"
        $minLength: 0